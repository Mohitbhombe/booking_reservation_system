openapi: 3.0.0
info:
  title: Booking Reservation System API
  version: 1.0.0
servers:
  - url: http://localhost:5000
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: API is healthy
  /api/auth/register:
    post:
      summary: Register a new customer user
  /api/auth/login:
    post:
      summary: Login and receive JWT token
  /api/resources:
    get:
      summary: List all resources
    post:
      summary: Create resource (admin)
  /api/bookings:
    post:
      summary: Create booking
  /api/bookings/my:
    get:
      summary: Get logged-in user bookings
  /api/bookings/{id}/cancel:
    patch:
      summary: Cancel booking
  /api/payments/bookings/{bookingId}/payment-intent:
    post:
      summary: Create Stripe payment intent for booking
